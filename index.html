<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: #161b22;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #9da7b3;
      margin-bottom: 25px;
    }

    .repo-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .repo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d1117;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #30363d;
    }

    .repo span {
      font-weight: bold;
    }

    a {
      text-decoration: none;
      background: #1f6feb;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
    }

    a:hover {
      background: #388bfd;
    }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #8b949e;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🔐 Access Hub</h1>
  <p>Select a repository and request access via GitHub Issue.</p>

  <div class="repo-list">

    <div class="repo">
      <span>Discovering Efficient Matrix Multiplication Algorithms</span>
      <a href="https://github.com/markovic-boris/access-hub/issues/1" target="_blank">
        Request Access
      </a>
    </div>

  </div>

  <div class="note">
    After clicking, please comment on the issue with your GitHub username and reason for access.
  </div>
</div>

</body>
</html>
